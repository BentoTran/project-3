services:
  server:
    build: ./server
    container_name: workout_server
    ports:
      - "3000:3000"
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: workout_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workout_planner
    ports:
      - "5432:5432"
    volumes:
      - workout_planner_data:/var/lib/postgresql/data

volumes:
  workout_planner_data: